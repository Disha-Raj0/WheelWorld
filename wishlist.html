<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Wishlist - WheelWorld</title>
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">Wheel<span>World</span></a>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="wishlist.html" class="active">❤️ Wishlist</a>
        <a href="#" id="logoutNav" onclick="logout()">Logout</a>
        <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
      </nav>
    </header>

    <div class="page-wrapper">
      <h1 class="page-title">My <span>Wishlist</span> ❤️</h1>
      <div class="wishlist-grid" id="wishlistContainer"></div>
    </div>

    <script src="data.js"></script>
    <script>
      function logout() {
        Auth.logout();
        window.location.href = "login.html";
      }
      function toggleDarkMode() {
        document.body.classList.toggle("dark");
        localStorage.setItem(
          "darkMode",
          document.body.classList.contains("dark"),
        );
      }
      if (localStorage.getItem("darkMode") === "true")
        document.body.classList.add("dark");

      if (!Auth.isLoggedIn()) window.location.href = "login.html";

      const user = Auth.currentUser();
      const wishlist =
        JSON.parse(localStorage.getItem(user + "_wishlist")) || [];
      const container = document.getElementById("wishlistContainer");
      const filtered = window.cars.filter(
        (c) => wishlist.includes(c._id) || wishlist.includes(c.name),
      );

      if (filtered.length === 0) {
        container.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">❤️</div>
          <h3>Your Wishlist is Empty</h3>
          <p>Browse cars and add your favourites to see them here.</p>
          <a href="index.html" style="display:inline-block;margin-top:20px;padding:12px 28px;background:var(--primary);color:white;text-decoration:none;border-radius:10px;font-weight:700;">Browse Cars</a>
        </div>`;
      } else {
        filtered.forEach((car) => {
          container.innerHTML += `
          <div class="car-card">
            <div class="car-card-img">
              <img src="${car.image}" alt="${car.name}" onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'">
            </div>
            <div class="car-card-body">
              <h3>${car.name}</h3>
              <div class="car-card-price">${car.price || "Price on request"}</div>
              <div class="car-card-specs">
                ${car.mileage ? `<span class="spec-tag">⛽ ${car.mileage}</span>` : ""}
                ${car.fuel ? `<span class="spec-tag">${car.fuel}</span>` : ""}
              </div>
              <div class="car-card-actions">
                <button class="btn-view" onclick="window.location.href='details.html?id=${car._id}'">View Details</button>
                <button class="btn-wish active" onclick="removeFromWishlist('${car._id}', this)" title="Remove">❤️</button>
              </div>
            </div>
          </div>`;
        });
      }

      function removeFromWishlist(carId, btn) {
        let wl = JSON.parse(localStorage.getItem(user + "_wishlist")) || [];
        wl = wl.filter((id) => id !== carId);
        localStorage.setItem(user + "_wishlist", JSON.stringify(wl));
        const card = btn.closest(".car-card");
        card.style.transition = "all 0.3s ease";
        card.style.opacity = "0";
        card.style.transform = "scale(0.95)";
        setTimeout(() => {
          card.remove();
          if (!document.querySelector(".car-card")) {
            container.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="empty-icon">❤️</div>
              <h3>Your Wishlist is Empty</h3>
              <p>Browse cars and add your favourites.</p>
              <a href="index.html" style="display:inline-block;margin-top:20px;padding:12px 28px;background:var(--primary);color:white;text-decoration:none;border-radius:10px;font-weight:700;">Browse Cars</a>
            </div>`;
          }
        }, 300);
      }
    </script>
  </body>
</html>
